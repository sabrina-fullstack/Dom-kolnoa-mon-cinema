<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .active {
      background-color: yellow;
      font-weight: bold;
    }
  </style>
  <body>
    <!-- getElementById -->
    <p id="text">Texte original</p>
    <button id="btn">Cliquer</button>
    <!-- classList.toggle -->
    <div id="maDiv">Hello</div>
    <button id="btn2">Toggle classe</button>
    <ul id="maListe"></ul>
    <!-- appendChild -->
    <button id="btn3">Ajouter item</button>
    <!-- innerHTML -->
    <div id="monDiv"></div>
    <button id="btn4">Gras</button>
    <!-- Element.remove() -->
    <p id="paraSuppr">Cliquez pour me supprimer !</p>
    <!-- addEventListener / input event -->
    <input id="monInput" type="text" placeholder="Tapez quelque chose" />
    <p id="compteur">0 caractères</p>
    <!-- mouseenter / mouseleave -->
    <div id="divSouris">Survolez-moi !</div>
    <!-- //SUBMIT EVENT  -->
    <form id="monForm">
      <input type="text" id="nom" placeholder="Votre nom" />
      <button type="submit">Envoyer</button>
      <!-- focus / blur -->
      <input id="inputFocus" placeholder="Cliquez ici" />
      <p id="messageFocus"></p>
    </form>
    <!-- DOMContentLoaded  -->
    <p id="message"></p>
    <!-- Local Storage -->
    <p id="resultat"></p>
    <!-- JSON.stringify / JSON.parse -->
    <p id="resultat2"></p>
    <!-- click event — Compteur -->
    <button id="btnCompteur">Cliquer</button>
    <span id="compteur2">0</span>
    <!-- preventDefault  -->
    <a href="https://google.com" id="monLien">Aller sur Google</a>
    <!-- Event Delegation -->
<ul id="maListe2">
  <li>Film 1</li>
  <li>Film 2</li>
  <li>Film 3</li>
</ul>
    <script src="scriptclaude.js"></script>
  </body>
</html>
